<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orthocare - Dentist Settings</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f6f8;
            margin: 0;
        }
        
        .header {
            background-color: #2d4569;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: fixed;
            top: 0;
            right: 0;
            left: 250px; /* Make space for sidebar */
            z-index: 100;
            height: 50px;
        }
        
        .header-title {
            font-size: 18px;
            font-weight: bold;
        }
        
        .header-icons {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .sidebar {
            width: 250px;
            background-color: #2d4569;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            color: white;
            z-index: 200;
        }
        
        .sidebar a {
            display: block;
            padding: 15px 20px;
            color: white;
            text-decoration: none;
            border-left: 4px solid transparent;
        }
        
        .sidebar a:hover,
        .sidebar a.active {
            background-color: #1f324d;
            border-left: 4px solid #92b4d3;
        }
        
        .main-content {
            margin-left: 250px;
            padding: 70px 20px 20px 20px; /* Add top padding to account for header */
        }
        
        .dashboard-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        
        .report-section {
            background-color: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .report-title {
            font-size: 18px;
            font-weight: bold;
            color: #2d4569;
        }
        
        .report-filter {
            background-color: #2d4569;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 14px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .stat-card {
            background-color: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .stat-title {
            color: #2d4569;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #2d4569;
        }
        
        .stat-description {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        

        .save-changes {
            background-color: #2d4569;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;

            margin-left: auto;
        }
        
        .save-changes:hover {
            background-color: #1f324d;
        }

        .pfp {
            width: 15%;
            height: 15%;

            border-radius: 50%;

            object-fit: contain;
        }

        .edit-icon {
            width: 32px;
            height: 32px;
        }

        .input-group {
            display: flex;
            gap: 20px;
        }

        .input-changer {
            display: flex; 
            flex-direction: column;
            width: 25%;

            margin: 25px 0px;
        }

        .input-changer input {
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            
        }

        .account-name {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: fit-content;
            margin-left: 0;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="sidebar">
        <a href="#">Dashboard</a>
        <a href="admin_patient_management.html">Patient Management</a>
        <a href="{{ url_for('admin_user_management') }}">User Management</a>
        <a href="#">Appointment</a>
        <a href="#">Transactions</a>
        <a href="{{ url_for('admin_treatments') }}">Treatments</a>
        <a href="#">Dental Cases</a>
        <a href="#" class="active">Settings</a>
    </div>
    
    <div class="header">
        <div class="header-title">Dentist | Settings</div>
        <div class="header-icons">
            <span>🔔</span>
            <span>👤</span>
        </div>
    </div>
    
    <div class="main-content">
        <img class="pfp" src="..\static\default_pfp.png">
        <input type="image" class="edit-icon" src="..\static\edit-icon.png">
        <div class="account-name">
            <h3>Dr. [FULL NAME]</h3>
            <div>Dentist</div>
        </div>

        <form class="edit-profile">
            <div class="input-group">
                <div class="input-changer">
                    <label for="lname">LAST NAME</label>
                    <input type="text" id="lname" placeholder="Last Name...">
                </div>
    
                <div class="input-changer">
                    <label for="fname">FIRST NAME</label>
                    <input type="text" id="fname" placeholder="First Name...">
                </div>
    
                <div class="input-changer">
                    <label for="address">ADDRESS</label>
                    <input type="text" id="address" placeholder="Address...">
                </div>
            </div>

            <div class="input-group">
                <div class="input-changer">
                    <label for="email">EMAIL ADDRESS</label>
                    <input type="text" id="email" placeholder="Email Address...">
                </div>
    
                <div class="input-changer">
                    <label for="phone">PHONE NUMBER</label>
                    <input type="text" id="phone" placeholder="Phone Number...">
                </div>
            </div>
            

            <h2>Change Password?</h2>

            <div class="input-group">
                <div class="input-changer">
                    <label for="newPass">NEW PASSWORD</label>
                    <input type="password" id="newPass">
                </div>
    
                <div class="input-changer">
                    <label for="confirmPass">RE-ENTER PASSWORD</label>
                    <input type="password" id="confirmPass">
                </div>
            </div>

            <input class="save-changes" type="submit" value="Save Changes">
        </div>
    </div>
</body>
</html>
